services:
  - type: web
    name: plprs
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: gunicorn plprs_project.wsgi:application
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: WEB_CONCURRENCY
        value: "1"
      - key: PLPRS_ENABLE_ML_LIBS
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: plprs-db
          property: connectionString

databases:
  - name: plprs-db
    plan: free
    databaseName: plprs_db
    user: plprs_user
